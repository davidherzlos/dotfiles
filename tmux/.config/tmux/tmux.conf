# Catppuccin theme.
# set -g @catppuccin_flavor "latte"
# set -g @catppuccin_window_status_style "rounded"
# run ~/.config/tmux/catppuccin/tmux/catppuccin.tmux
# set -g status-right-length 100
# set -g status-left-length 100
# set -g status-left ""
# set -g status-right "#{E:@catppuccin_status_application}"
# set -ag status-right "#{E:@catppuccin_status_session}"

# List of plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins2kabhishek/tmux2k'
# set -g @tmux2k-theme 'gruvbox'
# set -g @tmux2k-theme 'duoblue'
# set -g @tmux2k-theme 'duo'
# set -g @tmux2k-theme 'default'
set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-show-powerline true
set -g @tmux2k-icons-only false

# Gruvbox theme. (via tpm)
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'dark' # or 'dark256', 'light', 'light256'

# Reload config file.
bind r source-file ~/.config/tmux/tmux.conf

# Initialize TMUX plugin manager.
run '~/.tmux/plugins/tpm/tpm'
