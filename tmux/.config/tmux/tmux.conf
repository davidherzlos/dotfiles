#u/usr/bin/env bash

# Change prefix from 'Ctrl+B' to 'Ctrl+A'.
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

#Disable exit-empty.
set -s exit-empty on

# Start counting pane and window number at 0.
set -g base-index 0
setw -g pane-base-index 0

# Disable automatic renaming.
set-option -wg automatic-rename off

# Allow tmux to use transparent bg color.
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "xterm-kitty"

# Bind Prefix + t to clock mode.
bind C-t clock-mode

# Enable mouse control.
set -g mouse on

# Instruct tmux to forward clipboard sequences to the outer terminal
set -g set-clipboard on

# Required for tmux >= 3.3: allow escape sequence passthrough per-pane
set -g allow-passthrough on
set -g focus-events on

# Sync host clipboard into tmux buffer on focus (adjust command for your OS)
# For X11
set-hook -g pane-focus-in  'run-shell "xclip -selection clipboard -o | tmux load-buffer -"'

# For Wayland
# set-hook -g pane-focus-in  'run-shell "wl-paste --no-newline | tmux load-buffer -"'

# Tmux status position.
set-option -g status-position bottom

# THEMES SECTION

